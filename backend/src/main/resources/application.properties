spring.application.name=backend

# ── Database ─────────────────────────────────────────────────────────────────
# Use H2 in-memory when explicit Postgres env vars are not provided.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:speakmate;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Disable open-in-view (this is a REST API — no view rendering)
spring.jpa.open-in-view=false

# ── Multipart file uploads (voice notes, resume uploads) ─────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Static frontend files (served directly from workspace root) ───────────────
spring.web.resources.static-locations=file:D:/SpeakmateAI/

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:SpeakMateAISuperSecretKeyThatMustBeAtLeast32BytesLongForSecurityReasons}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Groq API (replaces Gemini) ────────────────────────────────────────────────
# Free tier at https://console.groq.com/keys — no daily quota limits
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY}
# Model options: llama-3.3-70b-versatile (best quality), llama3-8b-8192 (fastest)
groq.api.model=llama-3.3-70b-versatile

# ── Logging (reduce noise in production; keep DEBUG only during development) ──
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.com.speakmate=DEBUG
