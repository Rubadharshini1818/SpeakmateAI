spring.application.name=backend

# ── Database ─────────────────────────────────────────────────────────────────
# On Render: set SPRING_DATASOURCE_URL to your Neon PostgreSQL connection string
# Locally: falls back to H2 in-memory (for development only)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:speakmate;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ── Connection Pool (HikariCP) ────────────────────────────────────────────────
# Neon free tier sleeps after inactivity — keep pool small to avoid exhaustion
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Neon requires SSL — this keepalive prevents dropped idle connections
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=30000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# "update" — auto-creates tables on first run, then safely updates schema on redeploy
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# PostgreSQL-specific settings (ignored when using H2 locally)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Disable PostgreSQL "sequence" naming to match our UUID primary keys
spring.jpa.properties.hibernate.id.new_generator_mappings=true
# Batch inserts for better write performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Multipart file uploads (voice notes, resume uploads) ─────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Static frontend files (served from the Docker image) ─────────────────────
spring.web.resources.static-locations=file:/app/Frontend/

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:SpeakMateAISuperSecretKeyThatMustBeAtLeast32BytesLongForSecurityReasons}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Groq API ─────────────────────────────────────────────────────────────────
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY:your_api_key_here}
groq.api.model=llama-3.3-70b-versatile

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.com.speakmate=INFO
logging.level.com.zaxxer.hikari=WARN
