<script>
  // Wire up login API
  const form = document.getElementById('login-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const response = await fetch(API_BASE_URL + '/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();
      if (response.ok) {
        localStorage.setItem('speakmate_token', data.token);
        localStorage.setItem('speakmate_user', JSON.stringify({
          userId: data.userId,
          username: data.username,
          email: data.email,
          learningLevel: data.learningLevel
        }));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.message || "Login failed. Please check credentials.");
      }
    } catch (err) {
      console.error(err);
      alert("An error occurred. Please make sure the backend server is running.");
    }
  });

  // Official Google Sign-In Initialization
  window.onload = function () {
    // IMPORTANT: Replace this with your actual Google Client ID from Google Cloud Console!
    const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID_HERE";
    
    if (GOOGLE_CLIENT_ID !== "YOUR_GOOGLE_CLIENT_ID_HERE") {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleResponse
      });
      google.accounts.id.renderButton(
        document.getElementById("google-btn"),
        { theme: "outline", size: "large", width: 300, shape: "pill" }
      );
    } else {
      document.getElementById("google-btn").innerHTML = "<p class='text-xs text-red-500 text-center'>Google Client ID is missing.<br/>Check login.html code.</p>";
    }
  };

  async function handleGoogleResponse(response) {
    // Decode the Google JWT credential
    const token = response.credential;
    const payload = JSON.parse(atob(token.split('.')[1]));
    
    try {
      const res = await fetch(API_BASE_URL + '/api/auth/google', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          googleId: payload.sub,
          email: payload.email,
          name: payload.name
        })
      });

      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('speakmate_token', data.token);
        localStorage.setItem('speakmate_user', JSON.stringify({
          userId: data.userId,
          username: data.username,
          email: data.email,
          learningLevel: data.learningLevel
        }));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.message || "Google Sign-In failed.");
      }
    } catch (err) {
      console.error(err);
      alert("An error occurred during Google Sign-In.");
    }
  }
</script>
