<style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FDF6E3;
            overflow: hidden;
            font-size: 14px; /* Reduced base font size by ~15% */
        }

        .blur-blob {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.1;
        }

        .blob-tr { top: -80px; right: -80px; background-color: #F5C84C; }
        .blob-bl { bottom: -80px; left: -80px; background-color: #E8A020; }

        .wave-bar {
            width: 3px;
            background-color: #F5C84C;
            border-radius: 4px;
            animation: wave 1s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 6px; }
            50% { height: 20px; }
        }

        .ping-emerald {
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% { transform: scale(2.5); opacity: 0; }
        }

        .glass-badge {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
        }

        .btn-gold-gradient {
            background: linear-gradient(135deg, #F2B544 0%, #F5C84C 100%);
        }

        .input-focus-glow:focus {
            box-shadow: 0 0 0 2px rgba(245, 200, 76, 0.2);
            border-color: #F5C84C !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<!-- Atmospheric Background Blobs -->
<div class="blur-blob blob-tr"></div>
<div class="blur-blob blob-bl"></div>
<!-- Main Container Card (Reduced max-width, removed shadows) -->
<main class="w-full max-w-[720px] bg-white rounded-xl overflow-hidden border border-[#E8E0D0]/50 flex flex-col md:flex-row relative">
<!-- Left Panel: Brand & Imagery (40%) -->
<div class="hidden md:block w-[40%] relative overflow-hidden bg-surface-container">
<img alt="Student studying with SpeakMate AI" class="absolute inset-0 w-full h-full object-cover" src="assets/images/student_study.png"/>
<!-- Removed edge-fade overlay as requested -->
<!-- Glassmorphism Badge -->

</div>
<!-- Right Panel: Form (60%) -->
<div class="flex-1 w-full md:w-[60%] bg-white p-6 md:p-10 flex flex-col justify-center">
<!-- Header Section (Tightened spacing) -->
<div class="flex flex-col gap-5">
<!-- Logo -->
<div class="flex items-center gap-3 group cursor-pointer w-fit" id="brand-logo">
<div class="w-9 h-9 bg-charcoal rounded flex items-center justify-center gap-1">
<div class="wave-bar" style="animation-delay: 0.1s;"></div>
<div class="wave-bar" style="animation-delay: 0.2s;"></div>
<div class="wave-bar" style="animation-delay: 0.3s;"></div>
<div class="wave-bar" style="animation-delay: 0.4s;"></div>
<div class="wave-bar" style="animation-delay: 0.5s;"></div>
</div>
<span class="font-brand text-[22px] font-bold tracking-tight text-charcoal">
                        Speak<span class="text-amber-brand">Mate</span><span class="text-charcoal"> AI</span>
</span>
</div>
<!-- Text -->
<div>
<h1 class="text-[20px] font-bold text-charcoal mb-0.5 leading-tight">Let's start talking!</h1>
<p class="text-[13px] text-charcoal/60">Sign in to continue your language journey.</p>
</div>
</div>
<!-- Login Form (Compact heights and margins) -->
<form class="flex flex-col gap-3.5 mt-6" id="login-form" onsubmit="return false">
<!-- Email Input -->
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[18px]">mail</span>
</div>
<input id="email" class="w-full pl-12 pr-5 h-[42px] bg-[#FDFAF4] border-[#E8E0D0] rounded-full text-charcoal input-focus-glow transition-all placeholder:text-outline/60 outline-none border text-[13px]" placeholder="Email address" type="email" required/>
</div>
<!-- Password Input -->
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[18px]">lock</span>
</div>
<input id="password" class="w-full pl-12 pr-5 h-[42px] bg-[#FDFAF4] border-[#E8E0D0] rounded-full text-charcoal input-focus-glow transition-all placeholder:text-outline/60 outline-none border text-[13px]" placeholder="Password" type="password" required/>
</div>
<!-- Forgot Password -->
<div class="flex justify-end px-2">
<a class="text-[12px] font-semibold text-amber-brand hover:underline" href="#">Forgot password?</a>
</div>
<!-- Actions (Compact spacing) -->
<div class="flex flex-col gap-2.5 mt-3">
<button id="login-btn" type="submit" class="btn-gold-gradient w-full h-[48px] rounded-full font-bold text-charcoal shadow-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-2 text-[14px]">
<span>Login</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<button id="google-btn" type="button" class="w-full h-[48px] border border-[#E8E0D0] rounded-full bg-white text-charcoal font-semibold hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-2.5 text-[14px]">
<svg class="w-4 h-4" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.2 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
</div>
<p class="text-center text-[12px] text-charcoal/40 mt-3">
                    New to SpeakMate? <a class="text-amber-brand font-bold hover:underline" href="signup.html">Join now</a>
</p>
</form>
</div>
</main>

<script>
  // Wire up login API
  const form = document.getElementById('login-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();
      if (response.ok) {
        localStorage.setItem('speakmate_token', data.token);
        localStorage.setItem('speakmate_user', JSON.stringify({
          userId: data.userId,
          username: data.username,
          email: data.email,
          learningLevel: data.learningLevel
        }));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.message || "Login failed. Please check credentials.");
      }
    } catch (err) {
      console.error(err);
      alert("An error occurred. Please make sure the backend server is running.");
    }
  });

  // Google Sign-In Simulation
  document.getElementById('google-btn').addEventListener('click', async () => {
    const simulatedGoogleId = "g_" + Math.random().toString(36).substr(2, 9);
    const simulatedEmail = prompt("Enter your Google Account email for simulation:", "alex.johnson@gmail.com");
    if (!simulatedEmail) return;
    
    const simulatedName = "Alex Johnson";

    try {
      const response = await fetch('/api/auth/google', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          googleId: simulatedGoogleId,
          email: simulatedEmail,
          name: simulatedName
        })
      });

      const data = await response.json();
      if (response.ok) {
        localStorage.setItem('speakmate_token', data.token);
        localStorage.setItem('speakmate_user', JSON.stringify({
          userId: data.userId,
          username: data.username,
          email: data.email,
          learningLevel: data.learningLevel
        }));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.message || "Google Sign-In failed.");
      }
    } catch (err) {
      console.error(err);
      alert("An error occurred during Google Sign-In simulation.");
    }
  });
</script>
</body></html>
