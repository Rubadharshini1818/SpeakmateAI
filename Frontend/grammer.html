<script>
  // ─── Reading Progress Bar ───────────────────────────────────────────────────
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    document.getElementById('reading-progress').style.width = progress + '%';

    // Active TOC link highlighting
    const anchors = document.querySelectorAll('#lesson-content [id]');
    let current = '';
    anchors.forEach(el => {
      if (el.getBoundingClientRect().top <= 120) current = el.id;
    });
    document.querySelectorAll('.toc-link').forEach(link => {
      link.classList.toggle('active', link.dataset.anchor === current);
    });
  });

  // ─── Lightweight Markdown → HTML renderer ───────────────────────────────────
  function renderMarkdown(text) {
    if (!text) return '';
    const lines = text.split('\n');
    let html = '';
    let inUl = false;
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];
      // Headings
      if (line.startsWith('### ')) { if (inUl) { html += '</ul>'; inUl = false; } html += `<h3>${line.slice(4)}</h3>`; continue; }
      if (line.startsWith('## '))  { if (inUl) { html += '</ul>'; inUl = false; } html += `<h2>${line.slice(3)}</h2>`; continue; }
      if (line.startsWith('# '))   { if (inUl) { html += '</ul>'; inUl = false; } html += `<h1>${line.slice(2)}</h1>`; continue; }
      // Unordered list
      if (line.startsWith('- ') || line.startsWith('* ')) {
        if (!inUl) { html += '<ul>'; inUl = true; }
        html += `<li>${inlineMarkdown(line.slice(2))}</li>`;
        continue;
      }
      if (inUl) { html += '</ul>'; inUl = false; }
      // Blockquote
      if (line.startsWith('> ')) { html += `<blockquote>${inlineMarkdown(line.slice(2))}</blockquote>`; continue; }
      // Empty line = paragraph break
      if (line.trim() === '') { html += ''; continue; }
      // Regular paragraph
      html += `<p>${inlineMarkdown(line)}</p>`;
    }
    if (inUl) html += '</ul>';
    return html;
  }

  function inlineMarkdown(text) {
    return text
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  let currentLesson = null;
  let allSections = [];
  const token = localStorage.getItem('speakmate_token');
  if(!token) window.location.href='/login.html';

  async function fetchLessons(preserveLesson) {
    try {
      const res = await fetch('/api/classroom/lessons?module=GRAMMAR', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('speakmate_token');
        window.location.href = '/login.html';
        return;
      }
      if (!res.ok) {
        throw new Error('HTTP error ' + res.status);
      }
      const data = await res.json();
      allSections = data;
      renderSidebar(data);
      // Auto-load first lesson on initial load
      if (!preserveLesson && !currentLesson && data.length > 0 && data[0].lessons.length > 0) {
        loadLesson(data[0].lessons[0]);
      }
      // If preserving current lesson, re-load it to refresh UI
      if (preserveLesson && currentLesson) {
        const flat = data.flatMap(s => s.lessons);
        const updated = flat.find(l => l.id === currentLesson.id);
        if (updated) loadLesson(updated);
      }
    } catch(e) {
      console.error('fetchLessons error:', e);
    }
  }

  function renderSidebar(sections) {
    const nav = document.querySelector('#lesson-nav .space-y-1');
    if (!nav) return;
    nav.innerHTML = '';
    let totalLessons = 0, completedCount = 0;
    sections.forEach(sec => {
      const header = document.createElement('div');
      header.className = 'px-3 py-2 text-label-sm text-outline uppercase tracking-widest font-bold mt-4';
      header.textContent = sec.section;
      nav.appendChild(header);
      
      sec.lessons.forEach(lesson => {
        totalLessons++;
        if (lesson.status === 'COMPLETED') completedCount++;
        let dotColor = lesson.status === 'COMPLETED' ? 'bg-green-500' : (lesson.status === 'IN_PROGRESS' ? 'bg-primary animate-pulse' : 'bg-on-surface-variant/40');
        let icon = lesson.status === 'COMPLETED' ? 'check_circle' : (lesson.status === 'IN_PROGRESS' ? 'play_circle' : 'radio_button_unchecked');
        let isActive = currentLesson && currentLesson.id === lesson.id;
        let activeClass = isActive ? 'nav-active' : 'hover:bg-surface-container-high';
        
        const link = document.createElement('a');
        link.href = '#';
        link.className = `flex items-center justify-between px-3 py-2.5 rounded-lg transition-colors group ${activeClass}`;
        link.innerHTML = `
          <div class="flex items-center gap-3">
            <span class="status-dot ${dotColor}"></span>
            <span class="text-body-md text-on-surface">${lesson.title}</span>
          </div>
          <span class="material-symbols-outlined text-[18px] text-outline">${icon}</span>
        `;
        link.addEventListener('click', e => {
          e.preventDefault();
          loadLesson(lesson);
        });
        nav.appendChild(link);
      });
    });
    // Update progress counter (if element exists)
    const progressEl = document.getElementById('grammar-progress-count');
    if (progressEl) progressEl.textContent = `${completedCount} / ${totalLessons} Lessons`;
  }

  let currentLessonContent = null;
  const quizAnswers = {};

  function loadLesson(lesson) {
    currentLesson = lesson;
    
    // Update Header Breadcrumb
    document.getElementById('lesson-header').innerHTML = `
      <div class="flex items-center gap-2 text-on-surface-variant text-label-sm">
          <span>Grammar</span>
          <span class="material-symbols-outlined text-[16px]">chevron_right</span>
          <span class="text-primary font-bold">${lesson.title}</span>
      </div>
      <div class="flex items-center gap-4">
          <button onclick="markComplete('${lesson.id}')" class="px-4 py-2 bg-primary text-on-primary rounded-full font-bold shadow-sm hover:bg-primary/90">Mark Complete</button>
      </div>
    `;

    const contentDiv = document.getElementById('lesson-content');
    if(!lesson.content || lesson.content === '{}') {
       contentDiv.innerHTML = `<p class="text-center text-on-surface-variant py-20">Content coming soon!</p>`;
       return;
    }
    
    let contentObj;
    try {
      contentObj = JSON.parse(lesson.content);
    } catch(e) {
      contentDiv.innerHTML = `<p class="text-red-500">Error parsing lesson data.</p>`;
      return;
    }
    currentLessonContent = contentObj;

    // Build Table of Contents dynamically
    let tocItems = [];
    tocItems.push({ name: 'Introduction', link: '#lesson-intro', anchor: 'lesson-intro' });
    if (contentObj.when_to_use) tocItems.push({ name: 'When to Use', link: '#when-to-use', anchor: 'when-to-use' });
    if (contentObj.formula) tocItems.push({ name: 'Grammar Formula', link: '#grammar-formula', anchor: 'grammar-formula' });
    if (contentObj.exceptions && contentObj.exceptions.length > 0) tocItems.push({ name: 'Exceptions to Rule', link: '#grammar-exceptions', anchor: 'grammar-exceptions' });
    if (contentObj.tables && contentObj.tables.length > 0) tocItems.push({ name: 'Solved Examples', link: '#solved-examples', anchor: 'solved-examples' });
    if (contentObj.real_world_scenarios && contentObj.real_world_scenarios.length > 0) tocItems.push({ name: 'Real-World Scenarios', link: '#real-world', anchor: 'real-world' });
    if (contentObj.time_expressions) tocItems.push({ name: 'Key Time Expressions', link: '#time-expressions', anchor: 'time-expressions' });
    if (contentObj.tense_comparison) tocItems.push({ name: 'Tense Comparison', link: '#tense-comparison', anchor: 'tense-comparison' });
    if (contentObj.mistakes && contentObj.mistakes.length > 0) tocItems.push({ name: 'Common Mistakes', link: '#common-mistakes', anchor: 'common-mistakes' });
    if (contentObj.faqs && contentObj.faqs.length > 0) tocItems.push({ name: 'FAQs', link: '#faqs', anchor: 'faqs' });
    if (contentObj.exercises && contentObj.exercises.length > 0) tocItems.push({ name: 'Practice Exercises', link: '#practice-exercises', anchor: 'practice-exercises' });
    if (contentObj.quiz && contentObj.quiz.length > 0) tocItems.push({ name: 'Mini Quiz', link: '#mini-quiz', anchor: 'mini-quiz' });
    if (contentObj.related_topics && contentObj.related_topics.length > 0) tocItems.push({ name: 'Related Topics', link: '#related-topics', anchor: 'related-topics' });

    // Populate the sticky right-panel TOC
    const tocPanel = document.getElementById('toc-panel');
    const tocPanelLinks = document.getElementById('toc-panel-links');
    if (tocItems.length > 1) {
      tocPanel.classList.remove('hidden');
      tocPanelLinks.innerHTML = tocItems.map(item =>
        `<a href="${item.link}" data-anchor="${item.anchor}" class="toc-link">${item.name}</a>`
      ).join('');
    } else {
      tocPanel.classList.add('hidden');
    }

    // Difficulty badge color
    const diffColor = { 'Beginner': 'bg-green-100 text-green-800', 'Intermediate': 'bg-blue-100 text-blue-800', 'Advanced': 'bg-orange-100 text-orange-800' };
    const diff = contentObj.difficulty || 'Intermediate';
    const diffClass = diffColor[diff] || 'bg-primary-container text-primary';

    let html = `
    <section id="lesson-intro" class="mb-stack-lg">

  window.navigateToRelatedTopic = function(title) {
     if (!allSections || allSections.length === 0) { console.warn('allSections not loaded yet'); return; }
     for (let sec of allSections) {
        let match = sec.lessons.find(l => l.title.toLowerCase() === title.toLowerCase());
        if (match) {
           loadLesson(match);
           window.scrollTo({ top: 0, behavior: 'smooth' });
           return;
        }
     }
     console.warn('Related topic not found:', title);
  };

  window.checkFillBlank = function(idx, answer) {
    const input = document.getElementById(`ex-input-${idx}`);
    const feedback = document.getElementById(`ex-feedback-${idx}`);
    if(input.value.toLowerCase().trim() === answer.toLowerCase().trim()) {
      input.classList.add('text-green-600');
      feedback.textContent = "Correct! Well done!";
      feedback.className = "mt-3 text-label-sm font-bold text-green-600";
    } else {
      input.classList.remove('text-green-600');
      feedback.textContent = "";
    }
  };

  window.checkMcqExercise = function(idx, opt, answer) {
    const feedback = document.getElementById(`ex-feedback-${idx}`);
    if(opt.toLowerCase().trim() === answer.toLowerCase().trim()) {
      feedback.textContent = "Correct! Great choice.";
      feedback.className = "mt-3 text-label-sm font-bold text-green-600";
    } else {
      feedback.textContent = "Incorrect. Try another option!";
      feedback.className = "mt-3 text-label-sm font-bold text-error";
    }
  };

  window.selectQuizAnswer = function(idx, opt, answer) {
    // Clear selection for this question
    const btns = document.querySelectorAll(`.quiz-opt-btn-${idx}`);
    btns.forEach(b => b.classList.remove('bg-primary-container/30', 'text-primary', 'font-bold', 'border-primary'));
    
    // Mark active
    let optClean = opt.replace(/'/g, "").replace(/"/g, "");
    const activeBtn = document.getElementById(`quiz-btn-${idx}-${optClean}`);
    if(activeBtn) {
       activeBtn.classList.add('bg-primary-container/30', 'text-primary', 'font-bold', 'border-primary');
    }
    
    quizAnswers[idx] = { selected: opt, correct: answer };
  };

  window.submitQuiz = function() {
    let score = 0;
    let total = currentLessonContent.quiz.length;
    
    for(let i=0; i<total; i++) {
       if(quizAnswers[i] && quizAnswers[i].selected.toLowerCase().trim() === quizAnswers[i].correct.toLowerCase().trim()) {
          score++;
       }
    }
    
    const result = document.getElementById('quiz-result');
    result.textContent = `Quiz Completed! Your Score: ${score} / ${total}`;
    if(score === total) {
       result.className = "mt-4 font-bold text-body-lg text-green-600";
    } else {
       result.className = "mt-4 font-bold text-body-lg text-primary";
    }
  };

  async function markComplete(lessonId) {
     try {
       await fetch(`/api/classroom/lessons/${lessonId}/progress?status=COMPLETED`, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token }
       });
       fetchLessons(true); // refresh sidebar, preserve current lesson view
     } catch(e) { console.error(e); }
  }

  // AI Teacher Logic
  document.getElementById('ai-teacher-btn').onclick = () => document.getElementById('ai-modal').classList.remove('hidden');
  document.getElementById('close-ai-modal').onclick = () => document.getElementById('ai-modal').classList.add('hidden');
  
  document.getElementById('ai-send-btn').onclick = async () => {
     const input = document.getElementById('ai-question');
     const text = input.value.trim();
     if(!text) return;
     input.value = '';
     
     const history = document.getElementById('ai-chat-history');
     history.innerHTML += `<div class="self-end bg-primary text-on-primary rounded-xl px-4 py-2 max-w-[80%] text-sm">${text}</div>`;
     history.scrollTop = history.scrollHeight;
     
     try {
       const res = await fetch('/api/chat/ask-teacher', {
         method: 'POST',
         headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
         body: JSON.stringify({
           question: text,
           lessonTitle: currentLesson ? currentLesson.title : ''
         })
       });
       const data = await res.json();
       history.innerHTML += `<div class="self-start bg-surface-container-high text-on-surface rounded-xl px-4 py-2 max-w-[80%] text-sm">${data.answer || 'Sorry, I could not generate a response.'}</div>`;
       history.scrollTop = history.scrollHeight;
     } catch(e) {
       console.error(e);
       history.innerHTML += `<div class="self-start bg-error-container text-on-error-container rounded-xl px-4 py-2 max-w-[80%] text-sm">Error connecting to AI Teacher.</div>`;
     }
  };

  // Allow Enter key to send AI question
  document.getElementById('ai-question').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('ai-send-btn').click();
  });

  // Wire up search box
  const searchInput = document.querySelector('#lesson-nav')?.closest('aside')?.querySelector('input[type="text"]');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase().trim();
      const nav = document.querySelector('#lesson-nav .space-y-1');
      if (!nav) return;
      nav.querySelectorAll('a').forEach(link => {
        const title = link.querySelector('span.text-body-md')?.textContent?.toLowerCase() || '';
        link.style.display = (!q || title.includes(q)) ? '' : 'none';
      });
      // Also show/hide section headers based on whether any child is visible
      nav.querySelectorAll('div.uppercase').forEach(header => {
        let next = header.nextElementSibling;
        let hasVisible = false;
        while (next && !next.classList.contains('uppercase')) {
          if (next.style.display !== 'none') hasVisible = true;
          next = next.nextElementSibling;
        }
        header.style.display = hasVisible ? '' : 'none';
      });
    });
  }

  fetchLessons();
</script>
</body>
</html>
