<style>
  body { font-family: 'Poppins', sans-serif; background: #FDF6E3; }
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1c5af; border-radius: 10px; }

  /* Equalizer bars for AI speaking */
  .eq-bar {
    width: 3px;
    height: 4px;
    background: #765b00;
    border-radius: 2px;
    transition: height 0.15s ease;
  }
  .eq-bar.speaking {
    animation: eq-pulse 0.5s ease-in-out infinite alternate;
  }
  .eq-bar:nth-child(1).speaking { animation-delay: 0s; }
  .eq-bar:nth-child(2).speaking { animation-delay: 0.1s; }
  .eq-bar:nth-child(3).speaking { animation-delay: 0.2s; }
  .eq-bar:nth-child(4).speaking { animation-delay: 0.1s; }
  .eq-bar:nth-child(5).speaking { animation-delay: 0s; }
  @keyframes eq-pulse {
    from { height: 3px; }
    to   { height: 16px; }
  }

  /* Mic pulse while listening */
  .mic-listening {
    animation: mic-pulse 1.2s ease-in-out infinite;
    background: linear-gradient(135deg, #e53e3e, #c53030) !important;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.5); }
    50%       { box-shadow: 0 0 0 14px rgba(229, 62, 62, 0); }
  }

  /* Typing dots indicator */
  .typing-dot {
    width: 6px; height: 6px;
    background: #a0916b;
    border-radius: 50%;
    animation: typing-bounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40%           { transform: translateY(-8px); opacity: 1; }
  }

  /* Word-reveal animation for streaming text */
  .word-reveal { opacity: 0; transition: opacity 0.08s ease; }
  .word-reveal.visible { opacity: 1; }

  /* Voice mode ring */
  .voice-ring {
    animation: voice-ring-pulse 2s ease-in-out infinite;
  }
  @keyframes voice-ring-pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50%       { transform: scale(1.5); opacity: 0; }
  }

  /* Mode toggle highlight */
  .mode-btn.active {
    background: linear-gradient(135deg, #F5C84C, #F2B544);
    color: #241a00;
    font-weight: 700;
  }
</style>

<script>
// ═══════════════════════════════════════════════════════════
//  AUTH CHECK
// ═══════════════════════════════════════════════════════════
const token = localStorage.getItem('speakmate_token');
if (!token) { window.location.href = 'login.html'; }

// Parse username from JWT
try {
  const payload = JSON.parse(atob(token.split('.')[1]));
  const name = payload.sub || payload.name || 'there';
  document.getElementById('welcome-title').textContent = `👋 Hi ${name}!`;
  const userObj = JSON.parse(localStorage.getItem('speakmate_user') || '{}');
  if (userObj.username) {
    document.getElementById('welcome-title').textContent = `👋 Hi ${userObj.username}!`;
  }
} catch(e) {}

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const chatContainer   = document.getElementById('chat-container');
const emptyState      = document.getElementById('empty-state');
const messagesList    = document.getElementById('messages-list');
const navStatusText   = document.getElementById('nav-status-text');
const statusDot       = document.getElementById('status-dot');
const chatInput       = document.getElementById('chat-input');

let currentMode       = 'text';   // 'text' | 'voice'
let isMicListening    = false;    // SpeechRecognition active?
let isSpeaking        = false;    // SpeechSynthesis active?
let isSending         = false;    // API request in-flight? (prevents duplicate sends)
let recognition       = null;     // SpeechRecognition instance
let autoSpeakEnabled  = true;     // speak AI replies in voice mode (or always)

// ═══════════════════════════════════════════════════════════
//  SPEECH RECOGNITION SETUP
// ═══════════════════════════════════════════════════════════
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function createRecognition() {
  if (!SpeechRecognition) return null;
  const rec = new SpeechRecognition();
  rec.lang = 'en-US';
  rec.continuous = false;
  rec.interimResults = true;  // show live transcript as user speaks

  rec.onstart = () => {
    isMicListening = true;
    setNavStatus('🎙️ Listening...', '#e53e3e');
    document.getElementById('voice-ring').classList.remove('hidden');
    const micBtn = document.getElementById('voice-mic-btn');
    micBtn.classList.add('mic-listening');
    micBtn.style.background = '';
    document.getElementById('voice-mic-icon').textContent = 'stop';
    document.getElementById('voice-status-label').textContent = 'Listening... speak now!';
    document.getElementById('voice-transcript-preview').classList.remove('hidden');
    document.getElementById('voice-transcript-preview').textContent = '...';
  };

  rec.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    const preview = document.getElementById('voice-transcript-preview');
    preview.textContent = final || interim || '...';
    if (final.trim()) {
      rec._finalTranscript = final.trim();
    }
  };

  rec.onerror = (e) => {
    console.error('SpeechRecognition error:', e.error);
    resetMicUI();
    if (e.error === 'not-allowed') {
      alert('Microphone access denied. Please allow mic permissions in your browser.');
    }
  };

  rec.onend = () => {
    isMicListening = false;
    resetMicUI();
    const transcript = rec._finalTranscript;
    rec._finalTranscript = '';
    if (transcript && transcript.length > 1) {
      // Auto-send the spoken text
      sendMessage(transcript);
    } else {
      document.getElementById('voice-status-label').textContent = 'Tap the mic to speak';
      document.getElementById('voice-transcript-preview').classList.add('hidden');
    }
  };

  return rec;
}

function resetMicUI() {
  document.getElementById('voice-ring').classList.add('hidden');
  const micBtn = document.getElementById('voice-mic-btn');
  micBtn.classList.remove('mic-listening');
  micBtn.style.background = 'linear-gradient(135deg,#F5C84C,#F2B544)';
  document.getElementById('voice-mic-icon').textContent = 'mic';
  document.getElementById('voice-status-label').textContent = 'Tap the mic to speak';
  setNavStatus('● Online', '#22c55e');
}

function toggleVoiceRecognition() {
  if (!SpeechRecognition) {
    alert('Voice recognition is only supported in Chrome, Edge, or Safari. Please use the text mode instead.');
    return;
  }
  if (isMicListening) {
    recognition && recognition.stop();
    return;
  }
  window.speechSynthesis.cancel();   // stop any ongoing speech
  recognition = createRecognition();
  recognition.start();
}

// Mic button in text mode bar — switches to voice mode & starts listening
function toggleVoiceInput() {
  setMode('voice');
  setTimeout(toggleVoiceRecognition, 150);
}

// ═══════════════════════════════════════════════════════════
//  SPEECH SYNTHESIS
// ═══════════════════════════════════════════════════════════
function speakText(text, bubbleEl) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.92;
  utt.pitch = 1.0;

  const bars = bubbleEl ? bubbleEl.querySelectorAll('.eq-bar') : [];
  isSpeaking = true;
  bars.forEach(b => b.classList.add('speaking'));
  setNavStatus('🔊 Speaking...', '#F5C84C');

  // Word-by-word reveal
  const textEl = bubbleEl ? bubbleEl.querySelector('.bubble-text') : null;
  if (textEl) {
    const words = text.split(' ');
    textEl.innerHTML = words.map(w => `<span class="word-reveal">${w}</span>`).join(' ');
    const spans = textEl.querySelectorAll('.word-reveal');
    let wi = 0;
    utt.onboundary = (ev) => {
      if (ev.name === 'word' && spans[wi]) {
        spans[wi].classList.add('visible');
        wi++;
      }
    };
  }

  utt.onend = () => {
    isSpeaking = false;
    bars.forEach(b => b.classList.remove('speaking'));
    setNavStatus('● Online', '#22c55e');
    if (textEl) textEl.querySelectorAll('.word-reveal').forEach(s => s.classList.add('visible'));
  };

  utt.onerror = () => {
    isSpeaking = false;
    bars.forEach(b => b.classList.remove('speaking'));
    setNavStatus('● Online', '#22c55e');
  };

  window.speechSynthesis.speak(utt);
}

// ═══════════════════════════════════════════════════════════
//  MODE TOGGLE (Text / Voice)
// ═══════════════════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  document.getElementById('text-input-bar').classList.toggle('hidden', mode === 'voice');
  document.getElementById('voice-input-bar').classList.toggle('hidden', mode === 'text');
  document.getElementById('voice-input-bar').classList.toggle('flex', mode === 'voice');

  document.getElementById('text-mode-btn').classList.toggle('active', mode === 'text');
  document.getElementById('text-mode-btn').classList.toggle('text-on-surface-variant', mode !== 'text');
  document.getElementById('voice-mode-btn').classList.toggle('active', mode === 'voice');
  document.getElementById('voice-mode-btn').classList.toggle('text-on-surface-variant', mode !== 'voice');
}

// ═══════════════════════════════════════════════════════════
//  NAV STATUS HELPER
// ═══════════════════════════════════════════════════════════
function setNavStatus(text, color) {
  navStatusText.textContent = text;
  navStatusText.style.color = color;
  statusDot.style.background = color;
}

// ═══════════════════════════════════════════════════════════
//  SEND MESSAGE (shared by text & voice)
// ═══════════════════════════════════════════════════════════
async function sendMessage(text) {
  if (!text || !text.trim()) return;
  if (isSending) return;  // prevent duplicate in-flight requests

  isSending = true;
  window.speechSynthesis.cancel();

  // Disable input while waiting for reply
  chatInput.value = '';
  chatInput.disabled = true;
  const sendBtn = document.querySelector('footer button[onclick="handleSend()"]');
  if (sendBtn) sendBtn.disabled = true;

  // Hide empty state, show messages
  emptyState.classList.add('hidden');
  messagesList.classList.remove('hidden');

  // Render user bubble immediately
  appendUserBubble(text, new Date().toISOString());

  // Show typing indicator
  const typingId = showTypingIndicator();
  setNavStatus('⚡ Thinking...', '#F5C84C');

  try {
    const res = await fetch('/api/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ message: text })
    });

    removeTypingIndicator(typingId);

    if (res.status === 401 || res.status === 403) {
      localStorage.removeItem('speakmate_token');
      window.location.href = 'login.html';
      return;
    }

    const data = await res.json();
    const aiReply = res.ok
      ? (data.aiText || 'Sorry, I had trouble with that!')
      : `Oops — ${data.message || 'something went wrong'}. Try again?`;

    const bubbleEl = appendAIBubble(aiReply, new Date().toISOString(), false);
    setNavStatus('● Online', '#22c55e');

    // Speak reply in both text and voice mode
    speakText(aiReply, bubbleEl);

    // Reset voice transcript preview
    document.getElementById('voice-transcript-preview').classList.add('hidden');

  } catch (err) {
    console.error('sendMessage error:', err);
    removeTypingIndicator(typingId);
    appendAIBubble('Network error! Please check your connection and try again.', new Date().toISOString(), false);
    setNavStatus('● Online', '#22c55e');
  } finally {
    isSending = false;
    chatInput.disabled = false;
    if (sendBtn) sendBtn.disabled = false;
    chatInput.focus();
  }
}

function handleSend() {
  const text = chatInput.value.trim();
  if (text) sendMessage(text);
}

function sendStarter(text) {
  chatInput.value = text;
  sendMessage(text);
}

function startConversation() {
  // Send a first greeting message from the user's side to warm up
  sendMessage("Hi Luna! Let's start talking. What should we chat about today?");
}

// ═══════════════════════════════════════════════════════════
//  UI BUILDERS
// ═══════════════════════════════════════════════════════════
function appendUserBubble(text, isoTime) {
  const timeStr = formatTime(isoTime);
  const html = `
    <div class="flex justify-end mb-4">
      <div class="max-w-[80%] flex flex-col items-end">
        <div class="bg-gradient-to-br from-primary-container to-secondary-container text-on-primary-container shadow-sm font-medium px-4 py-2.5 rounded-2xl rounded-tr-sm text-sm leading-relaxed">
          ${escapeHtml(text)}
        </div>
        <span class="text-[10px] text-on-surface-variant mt-1 mr-1">${timeStr}</span>
      </div>
    </div>
  `;
  messagesList.insertAdjacentHTML('beforeend', html);
  scrollToBottom();
}

          <div class="w-7 h-7 rounded-full bg-primary-container flex items-center justify-center overflow-hidden border-2 border-primary-fixed shadow-sm">
            <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrStV_s01hWOgAGXvsJ9SYzoN4w7e4P3U5vDVc-2tl-t-208UY4GkqI8PPkhNqkabrkk1ON4Rq5irX8vysWGOw4e6J3Rc1xGdgTKH3gba1hhDN8wwBEKXSba2BLYPnEJidVg74V-lEkiU9uBs_iSBlVeiKR500I5rrxl7mY1Z2XVlZEjV9Ouo_U61vXbKYtIgw-Vg24IakMRqfcXavG_1CoSknEbhymaZlFPwKM09g6E2-RXEu_C_cYQnLg_sYwR37ajy2GPWmDbs"/>
          </div>
          <!-- Equalizer bars -->
          <div class="flex items-end gap-[3px] h-5">
            <div class="eq-bar" style="animation-delay:0s"></div>
            <div class="eq-bar" style="animation-delay:0.1s"></div>
            <div class="eq-bar" style="animation-delay:0.2s"></div>
            <div class="eq-bar" style="animation-delay:0.1s"></div>
            <div class="eq-bar" style="animation-delay:0s"></div>
          </div>
          <!-- Replay button -->
          <button onclick="replayBubble('${bubbleId}')" class="opacity-0 group-hover:opacity-100 text-outline hover:text-primary transition-all ml-1" title="Replay">
            <span class="material-symbols-outlined text-[15px]">replay</span>
          </button>
        </div>
        <div class="bg-white border border-outline-variant shadow-sm text-on-surface px-4 py-2.5 rounded-2xl rounded-tl-sm">
          <div class="bubble-text text-sm leading-relaxed">${fromHistory ? escapeHtml(text) : ''}</div>
        </div>
        <span class="text-[10px] text-on-surface-variant mt-1 ml-1">Luna • ${timeStr}</span>
      </div>
    </div>
  `;
  messagesList.insertAdjacentHTML('beforeend', html);
  scrollToBottom();
  const el = document.getElementById(bubbleId);
  if (!fromHistory) {
    // Fill text immediately (speak will do word-by-word reveal)
    el.querySelector('.bubble-text').textContent = text;
  }
  // Make replay button visible on hover
  el.addEventListener('mouseenter', () => el.querySelector('button').style.opacity = '1');
  el.addEventListener('mouseleave', () => el.querySelector('button').style.opacity = '0');
  return el;
}

window.replayBubble = function(bubbleId) {
  const el = document.getElementById(bubbleId);
  const text = el ? el.querySelector('.bubble-text')?.textContent?.trim() : '';
  if (text) speakText(text, el);
};

// ─── Helpers ───────────────────────────────────────────────
function formatTime(iso) {
  try { return new Date(iso).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); } catch(e) { return ''; }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

// ═══════════════════════════════════════════════════════════
//  HISTORY LOAD  (persists across sessions)
// ═══════════════════════════════════════════════════════════
async function loadHistory() {
  try {
    const res = await fetch('/api/chat/history', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401 || res.status === 403) {
      localStorage.removeItem('speakmate_token');
      window.location.href = 'login.html';
      return;
    }
    if (!res.ok) {
      console.error('History load failed with status', res.status);
      return;  // leave empty state visible — user can still start fresh
    }
    const data = await res.json();
    if (data.length > 0) {
      emptyState.classList.add('hidden');
      messagesList.classList.remove('hidden');
      data.forEach(msg => {
        if (msg.sender === 'USER') appendUserBubble(msg.content, msg.createdAt);
        else appendAIBubble(msg.content, msg.createdAt, true);  // fromHistory=true → don't speak
      });
      scrollToBottom();
    }
  } catch(e) {
    console.error('Failed to load history — server may be offline:', e);
    // Non-fatal: leave empty/welcome state so user can still try typing
  }
}

// ═══════════════════════════════════════════════════════════
//  CLEAR HISTORY
// ═══════════════════════════════════════════════════════════
document.getElementById('clear-btn').onclick = async () => {
  if (!confirm('Clear this entire conversation?')) return;
  try {
    const res = await fetch('/api/chat/clear', {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) {
      console.error('Clear failed with status', res.status);
      return;
    }
    messagesList.innerHTML = '';
    messagesList.classList.add('hidden');
    emptyState.classList.remove('hidden');
    window.speechSynthesis.cancel();
  } catch(e) {
    console.error('Clear error:', e);
  }
};

// ═══════════════════════════════════════════════════════════
document.getElementById('back-btn').onclick = () => { window.location.href = 'dashboard.html'; };
chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });

// ═══════════════════════════════════════════════════════════
//  INIT

loadHistory();
