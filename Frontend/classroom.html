<script>
        const token = localStorage.getItem('speakmate_token');
        if (!token) window.location.href = 'login.html';

        // Simple input focus behavior
        const input = document.getElementById('chat-input');
        const inputWrapper = input.closest('.relative');
        
        input.addEventListener('focus', () => {
            inputWrapper.classList.add('active-glow');
        });
        
        input.addEventListener('blur', () => {
            inputWrapper.classList.remove('active-glow');
        });

        const chatFeed = document.getElementById('chat-feed');

        function appendUserMessage(text) {
            const div = document.createElement('div');
            div.className = "max-w-[800px] mx-auto w-full flex justify-end gap-4";
            div.innerHTML = `
                <div class="bg-primary text-on-primary p-6 rounded-lg rounded-tr-none soft-shadow max-w-[80%]">
                    <p class="font-body-md">${escapeHtml(text)}</p>
                </div>
            `;
            chatFeed.appendChild(div);
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        function appendTeacherMessage(text) {
            const div = document.createElement('div');
            div.className = "max-w-[800px] mx-auto w-full flex gap-4";
            div.innerHTML = `
                <div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center shrink-0 shadow-sm border-2 border-white">
                    <span class="material-symbols-outlined text-on-primary-container text-2xl">school</span>
                </div>
                <div class="flex flex-col gap-4 w-full">
                    <div class="bg-white p-6 rounded-lg rounded-tl-none soft-shadow border border-surface-container-highest/50">
                        <p class="font-body-md text-on-surface">${escapeHtml(text)}</p>
                    </div>
                </div>
            `;
            chatFeed.appendChild(div);
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        let typingIndicator = null;
        function showTyping() {
            if (typingIndicator) return;
            const div = document.createElement('div');
            div.className = "max-w-[800px] mx-auto w-full flex gap-4";
            div.innerHTML = `
                <div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center shrink-0 shadow-sm border-2 border-white">
                    <span class="material-symbols-outlined text-on-primary-container text-2xl">school</span>
                </div>
                <div class="flex flex-col gap-4 w-full">
                    <div class="bg-white p-4 rounded-lg rounded-tl-none soft-shadow border border-surface-container-highest/50 w-24 flex items-center justify-around">
                        <span class="w-2 h-2 bg-primary rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
                        <span class="w-2 h-2 bg-primary rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                        <span class="w-2 h-2 bg-primary rounded-full animate-bounce" style="animation-delay: 0.3s"></span>
                    </div>
                </div>
            `;
            chatFeed.appendChild(div);
            chatFeed.scrollTop = chatFeed.scrollHeight;
            typingIndicator = div;
        }

        function removeTyping() {
            if (typingIndicator) {
                typingIndicator.remove();
                typingIndicator = null;
            }
        }

        async function handleSend() {
            const query = input.value.trim();
            if (!query) return;
            input.value = "";

            appendUserMessage(query);
            showTyping();

            try {
                const response = await fetch(API_BASE_URL + '/api/chat/ask-teacher', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ question: query })
                });
                
                removeTyping();

                if (response.ok) {
                    const data = await response.json();
                    appendTeacherMessage(data.answer);
                } else {
                    appendTeacherMessage("Sorry, I could not process your query at this moment. Please try again.");
                }
            } catch (err) {
                removeTyping();
                console.error(err);
                appendTeacherMessage("An error occurred connecting to the teacher service.");
            }
        }

        function sendStarter(text) {
            input.value = text;
            handleSend();
        }

        function escapeHtml(string) {
            return String(string).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
