<script>
  // ── State Management ────────────────────────────────────────────────────────
  let currentLesson = null;
  let allSections   = [];
  const token = localStorage.getItem('speakmate_token');

  // Verify Auth immediately to avoid redirect issues
  if (!token) {
    window.location.href = '/login.html';
  }

  // Parse User Name from token (JWT payload) if available
  try {
    if (token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const payload = JSON.parse(window.atob(base64));
      if (payload && payload.sub) {
        document.getElementById('user-display-name').textContent = payload.sub;
        const initLetters = payload.sub.substring(0, 2).toUpperCase();
        document.querySelector('.bg-primary-container').textContent = initLetters;
      }
    }
  } catch(e) {
    console.warn("Could not parse user name from JWT:", e);
  }

  // ── Markdown Parser Helper ───────────────────────────────────────────────────
  function renderMarkdown(text) {
    if (!text) return '';
    const lines = text.split('\n');
    let html = '', inUl = false;
    for (let line of lines) {
      if (line.startsWith('### ')) {
        if (inUl) { html += '</ul>'; inUl = false; }
        html += `<h3 class="font-display text-headline-md text-primary mt-6 mb-2 font-bold">${line.slice(4)}</h3>`;
        continue;
      }
      if (line.startsWith('## ')) {
        if (inUl) { html += '</ul>'; inUl = false; }
        html += `<h2 class="font-display text-2xl text-primary mt-8 mb-4 font-bold border-b border-outline-variant/30 pb-2">${line.slice(3)}</h2>`;
        continue;
      }
      if (line.startsWith('**') && line.endsWith('**')) {
        if (inUl) { html += '</ul>'; inUl = false; }
        html += `<p class="font-bold text-on-surface mb-2">${line.slice(2, -2)}</p>`;
        continue;
      }
      if (line.startsWith('- ') || line.startsWith('* ')) {
        if (!inUl) { html += '<ul class="list-disc pl-6 space-y-2 mb-4 text-on-surface-variant">'; inUl = true; }
        let inner = line.slice(2).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html += `<li class="text-body-md">${inner}</li>`;
        continue;
      }
      if (inUl) { html += '</ul>'; inUl = false; }
      if (line.trim() === '') continue;
      let para = line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html += `<p class="text-body-md text-on-surface-variant leading-relaxed mb-4">${para}</p>`;
    }
    if (inUl) html += '</ul>';
    return html;
  }

  // ── Speech Synthesis (Click-to-Hear) ─────────────────────────────────────────
  window.playAudio = function(text, rate = 1.0) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = rate;
      window.speechSynthesis.speak(utterance);
    } else {
      alert("Text-to-speech is not supported by your browser.");
    }
  };

  // ── Speech Recognition practice (Listen & Repeat) ────────────────────────────
  let recognition = null;
  let isRecognitionActive = false;

  function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      console.warn("Speech Recognition API is not supported in this browser.");
      return null;
    }
    const rec = new SpeechRecognition();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = 'en-US';
    return rec;
  }

  window.toggleSpeechPractice = function(targetText) {
    const btn = document.getElementById('mic-record-btn');
    const label = document.getElementById('mic-status-label');
    const waves = document.querySelectorAll('.audio-wave span');
    const feedbackBox = document.getElementById('practice-recognition-feedback');

    if (!recognition) {
      recognition = initSpeechRecognition();
    }

    if (!recognition) {
      alert("Voice speech recognition is only natively supported in Google Chrome, Edge, and Safari. Please type or try on Chrome.");
      return;
    }

    if (isRecognitionActive) {
      recognition.stop();
      return;
    }

    feedbackBox.classList.add('hidden');
    recognition.onstart = () => {
      isRecognitionActive = true;
      btn.classList.remove('gold-gradient');
      btn.classList.add('bg-error');
      btn.innerHTML = '<span class="material-symbols-outlined text-4xl text-white">stop</span>';
      label.textContent = "Listening... Repeat now!";
      waves.forEach(w => w.style.animationPlayState = 'running');
    };

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      evaluateSpeechInput(transcript, targetText);
    };

    recognition.onerror = (event) => {
      console.error("Speech Recognition Error:", event.error);
      label.textContent = "Error: " + event.error;
      resetMicUI();
    };

    recognition.onend = () => {
      isRecognitionActive = false;
      resetMicUI();
    };

    recognition.start();
  };

  window.startPractice = function(text) {
    // Update the target phrase in the Listen & Repeat Practice box dynamically
    const targetBox = document.querySelector('#practice-section p.font-display');
    if (targetBox) {
      targetBox.textContent = `"${text}"`;
    }
    // Also update the volume button and mic button target phrase
    const micBtn = document.getElementById('mic-record-btn');
    if (micBtn) {
      micBtn.setAttribute('onclick', `toggleSpeechPractice('${text.replace(/'/g, "\\'")}')`);
    }
    const hearBtn = document.querySelector('#practice-section button[onclick^="playAudio"]');
    if (hearBtn) {
      hearBtn.setAttribute('onclick', `playAudio('${text.replace(/'/g, "\\'")}')`);
    }
    // Scroll to the practice section
    const practiceSec = document.getElementById('practice-section');
    if (practiceSec && mainScrollContainer) {
      const containerRect = mainScrollContainer.getBoundingClientRect();
      const elRect = practiceSec.getBoundingClientRect();
      const offset = elRect.top - containerRect.top + mainScrollContainer.scrollTop - 20;
      mainScrollContainer.scrollTo({ top: offset, behavior: 'smooth' });
    }
    // Automatically trigger the speech recognition
    setTimeout(() => {
      window.toggleSpeechPractice(text);
    }, 800);
  };

  function resetMicUI() {
    const btn = document.getElementById('mic-record-btn');
    const label = document.getElementById('mic-status-label');
    const waves = document.querySelectorAll('.audio-wave span');
    if (btn) {
      btn.classList.remove('bg-error');
      btn.classList.add('gold-gradient');
      btn.innerHTML = '<span class="material-symbols-outlined text-4xl" data-weight="fill">mic</span>';
    }
    if (label) label.textContent = "Tap to Record & Repeat";
    waves.forEach(w => w.style.animationPlayState = 'paused');
  }

  function evaluateSpeechInput(transcript, target) {
    const feedbackBox = document.getElementById('practice-recognition-feedback');
    const recognizedTextEl = document.getElementById('recognized-text');
    const matchScoreEl = document.getElementById('match-score');
    const scoreCircle = document.getElementById('score-circle');
    const scoreText = document.getElementById('score-text');
    const scoreFeedback = document.getElementById('score-feedback');
    const markCompleteBtn = document.getElementById('mark-complete-btn');

    // Simple word comparison score
    const cleanStr = s => s.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").replace(/\s+/g," ").trim();
    const cleanTranscript = cleanStr(transcript);
    const cleanTarget = cleanStr(target);
    
    const wordsT = cleanTranscript.split(" ");
    const wordsTarget = cleanTarget.split(" ");
    
    let matches = 0;
    wordsT.forEach(w => {
      if (wordsTarget.includes(w)) matches++;
    });

    const score = Math.min(100, Math.round((matches / Math.max(1, wordsTarget.length)) * 100));

    // Show feedback panel
    feedbackBox.classList.remove('hidden');
    recognizedTextEl.textContent = `"${transcript}"`;
    matchScoreEl.textContent = `${score}% Match`;

    // Update main performance circle
    if (scoreCircle && scoreText) {
      scoreText.textContent = `${score}%`;
      const offset = 440 - (440 * score) / 100;
      scoreCircle.style.strokeDashoffset = offset;
    }

    if (score >= 80) {
      scoreFeedback.textContent = "✅ Excellent! Your pronunciation is clear and correct!";
      scoreFeedback.className = "text-body-md font-semibold text-green-600 mt-2";
      if (markCompleteBtn) {
        markCompleteBtn.disabled = false;
        markCompleteBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    } else if (score >= 50) {
      scoreFeedback.textContent = "⚠️ Close! Keep your tongue placement correct and try again.";
      scoreFeedback.className = "text-body-md font-semibold text-secondary mt-2";
    } else {
      scoreFeedback.textContent = "❌ Try again. Focus on clarity and pronounce all syllables.";
      scoreFeedback.className = "text-body-md font-semibold text-error mt-2";
    }
  }

  // ── Minimal Pairs discrimination listening game ──────────────────────────────
  let currentRound = 1;
  let correctGuesses = 0;
  let minimalPairTarget = '';
  let minimalPairsList = [];

  window.startMinimalPairsGame = function() {
    currentRound = 1;
    correctGuesses = 0;
    document.getElementById('listening-game-start').classList.add('hidden');
    document.getElementById('listening-game-play').classList.remove('hidden');
    document.getElementById('listening-game-result').classList.add('hidden');
    
    // Read from current lesson content
    const content = JSON.parse(currentLesson.content);
    minimalPairsList = content.minimal_pairs_listen || [
      { word1: "sip", word2: "zip", correct: "sip", ipa1: "/sɪp/", ipa2: "/zɪp/" }
    ];
    
    loadListeningRound();
  };

  function loadListeningRound() {
    if (currentRound > 5 || currentRound > minimalPairsList.length) {
      showListeningGameResults();
      return;
    }

    document.getElementById('listening-round-num').textContent = currentRound;
    const pair = minimalPairsList[currentRound - 1];
    
    // Pick random target word from pair (word1 or word2)
    minimalPairTarget = Math.random() > 0.5 ? pair.word1 : pair.word2;

    // Reset options layout
    const optContainer = document.getElementById('listening-options');
    optContainer.innerHTML = `
      <button onclick="guessMinimalPairWord('${pair.word1}', '${pair.word1 === minimalPairTarget}')" class="flex-1 py-6 bg-white border-2 border-outline-variant hover:border-primary hover:bg-primary-container/5 rounded-2xl font-display font-bold text-2xl text-on-surface transition-all">
        ${pair.word1} <br/><span class="text-label-sm text-outline font-normal">${pair.ipa1}</span>
      </button>
      <button onclick="guessMinimalPairWord('${pair.word2}', '${pair.word2 === minimalPairTarget}')" class="flex-1 py-6 bg-white border-2 border-outline-variant hover:border-primary hover:bg-primary-container/5 rounded-2xl font-display font-bold text-2xl text-on-surface transition-all">
        ${pair.word2} <br/><span class="text-label-sm text-outline font-normal">${pair.ipa2}</span>
      </button>
    `;

    document.getElementById('listening-feedback').textContent = '';
    document.getElementById('listening-next-btn').classList.add('hidden');

    // Auto play target audio
    setTimeout(() => { playAudio(minimalPairTarget, 0.95); }, 400);
  }

  window.replayMinimalPairTarget = function() {
    if (minimalPairTarget) {
      playAudio(minimalPairTarget, 0.95);
    }
  };

  window.guessMinimalPairWord = function(word, isCorrect) {
    const feedback = document.getElementById('listening-feedback');
    const buttons = document.getElementById('listening-options').querySelectorAll('button');
    
    // Disable buttons
    buttons.forEach(b => b.disabled = true);

    if (isCorrect === 'true' || isCorrect === true) {
      feedback.innerHTML = `<span class="text-green-600 font-bold">✅ Correct! The word was indeed "${word}".</span>`;
      correctGuesses++;
    } else {
      feedback.innerHTML = `<span class="text-error font-bold">❌ Not quite. The spoken word was "${minimalPairTarget}".</span>`;
    }

    document.getElementById('listening-next-btn').classList.remove('hidden');
  };

  window.nextListeningRound = function() {
    currentRound++;
    loadListeningRound();
  };

  function showListeningGameResults() {
    document.getElementById('listening-game-play').classList.add('hidden');
    document.getElementById('listening-game-result').classList.remove('hidden');
    document.getElementById('listening-game-final-score').textContent = `${correctGuesses} / ${Math.min(5, minimalPairsList.length)}`;
  }

  // ── Practice MCQ validation ─────────────────────────────────────────────────
  window.checkQuizAnswer = function(element, opt, answer) {
    const parent = element.closest('.quiz-question-box');
    const buttons = parent.querySelectorAll('button');
    const feedback = parent.querySelector('.quiz-feedback');

    buttons.forEach(b => b.disabled = true);

    const isCorrect = opt.trim().toLowerCase() === answer.trim().toLowerCase();
    element.classList.remove('bg-white', 'border-outline-variant');
    
    if (isCorrect) {
      element.classList.add('bg-green-100', 'border-green-600', 'text-green-800');
      feedback.innerHTML = '<span class="text-green-600 font-bold">Correct! Well done.</span>';
    } else {
      element.classList.add('bg-red-100', 'border-red-600', 'text-red-800');
      feedback.innerHTML = `<span class="text-error font-bold">Incorrect. The correct answer is: ${answer}.</span>`;
    }
  };

  // ── Collapsible Sidebar Categories ─────────────────────────────────────────
  function renderSidebar(sections) {
    const nav = document.getElementById('lesson-nav');
    if (!nav) return;
    nav.innerHTML = '';
    
    let totalLessons = 0, completedCount = 0;

    // Initialize collapsible state
    if (!window.collapsedSections) {
      window.collapsedSections = {};
      sections.forEach(s => {
        const hasActive = currentLesson && s.lessons.some(l => l.id === currentLesson.id);
        window.collapsedSections[s.section] = !hasActive;
      });
    }

    sections.forEach(sec => {
      const isCollapsed = window.collapsedSections[sec.section];
      
      const secHeader = document.createElement('div');
      secHeader.className = 'px-2 py-2 text-label-sm text-outline uppercase tracking-wider font-bold mt-4 flex items-center justify-between cursor-pointer hover:text-primary transition-colors';
      secHeader.innerHTML = `
        <span>${sec.section}</span>
        <span class="material-symbols-outlined text-[16px] transition-transform duration-200 ${isCollapsed ? '-rotate-90' : ''}">expand_more</span>
      `;
      nav.appendChild(secHeader);

      const lessonGroup = document.createElement('div');
      lessonGroup.className = 'lesson-group-container space-y-1 pl-2';
      if (isCollapsed) {
        lessonGroup.classList.add('hidden');
      }
      nav.appendChild(lessonGroup);

      sec.lessons.forEach(lesson => {
        totalLessons++;
        if (lesson.status === 'COMPLETED') completedCount++;
        
        const isActive = currentLesson && currentLesson.id === lesson.id;
        const dotColor = lesson.status === 'COMPLETED' ? 'bg-green-500' : (lesson.status === 'IN_PROGRESS' ? 'bg-primary animate-pulse' : 'bg-on-surface-variant/40');
        const activeClass = isActive ? 'bg-primary-container/10 border-r-4 border-primary font-bold text-primary' : 'text-on-surface-variant hover:bg-surface-variant/50';
        
        const link = document.createElement('a');
        link.href = '#';
        link.className = `flex items-center justify-between px-3 py-2 rounded-lg transition-colors ${activeClass}`;
        link.innerHTML = `
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full ${dotColor}"></div>
            <span class="text-body-md text-[14px]">${lesson.title}</span>
          </div>
          ${lesson.status === 'COMPLETED' ? '<span class="material-symbols-outlined text-green-500 text-[16px]">check_circle</span>' : ''}
        `;
        link.addEventListener('click', e => {
          e.preventDefault();
          window.collapsedSections[sec.section] = false;
          loadLesson(lesson);
        });
        lessonGroup.appendChild(link);
      });

      secHeader.addEventListener('click', () => {
        window.collapsedSections[sec.section] = !window.collapsedSections[sec.section];
        renderSidebar(allSections);
      });
    });

    // Update Progress Pill
    const pill = document.querySelector('.bg-primary-container');
    if (pill) {
      pill.innerHTML = `<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div><span class="text-on-primary-container font-bold text-label-sm">${completedCount} / ${totalLessons} Lessons</span>`;
    }
  }

  // ── Sidebar Search ──────────────────────────────────────────────────────────
  const searchInput = document.querySelector('input[placeholder*="Search"]');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase().trim();
      const nav = document.getElementById('lesson-nav');
      if (!nav) return;

      const headers = nav.querySelectorAll('div');
      headers.forEach(header => {
        const titleSpan = header.querySelector('span');
        if (!titleSpan || header.querySelector('input')) return;
        const secName = titleSpan.textContent;
        const lessonGroup = header.nextElementSibling;
        if (!lessonGroup || !lessonGroup.classList.contains('lesson-group-container')) return;

        let matches = 0;
        lessonGroup.querySelectorAll('a').forEach(link => {
          const lTitle = link.querySelector('span.text-body-md')?.textContent?.toLowerCase() || '';
          const match = !q || lTitle.includes(q);
          link.style.display = match ? '' : 'none';
          if (match) matches++;
        });

        if (q && matches > 0) {
          header.style.display = '';
          lessonGroup.classList.remove('hidden');
          const chevron = header.querySelector('.material-symbols-outlined');
          if (chevron) chevron.className = 'material-symbols-outlined text-[16px] transition-transform duration-200';
        } else if (q && matches === 0) {
          header.style.display = 'none';
          lessonGroup.classList.add('hidden');
        } else {
          header.style.display = '';
          const isCollapsed = window.collapsedSections[secName];
          lessonGroup.classList.toggle('hidden', isCollapsed);
          const chevron = header.querySelector('.material-symbols-outlined');
          if (chevron) {
            chevron.className = `material-symbols-outlined text-[16px] transition-transform duration-200 ${isCollapsed ? '-rotate-90' : ''}`;
          }
        }
      });
    });
  }

  // ── Dynamic Layout Builders ─────────────────────────────────────────────────

  // ── Bottom Nav Bar Builder ──────────────────────────────────────────────────
  function buildBottomNav(lesson) {
    const all = allSections.flatMap(s => s.lessons);
    const idx = all.findIndex(l => l.id === lesson.id);
    const prev = idx > 0 ? all[idx - 1] : null;
    const next = idx < all.length - 1 ? all[idx + 1] : null;
    const isDone = lesson.status === 'COMPLETED';

    return `
      <nav class="fixed bottom-0 right-0 w-[calc(100%-260px)] h-20 bg-surface/90 backdrop-blur-xl border-t border-outline-variant/30 px-margin-desktop flex items-center justify-between z-50">
        <button onclick="navigateLessons(-1)" ${!prev ? 'disabled' : ''} class="flex items-center gap-2 text-on-surface-variant font-bold hover:text-primary transition-colors py-2 px-4 rounded-full hover:bg-primary-container/10 disabled:opacity-30">
          <span class="material-symbols-outlined">arrow_back</span> Previous
        </button>
        <div class="flex items-center gap-4">
          ${next ? `<div class="hidden md:flex flex-col items-end"><span class="text-label-sm text-on-surface-variant">Next up:</span><span class="text-body-md font-bold text-on-surface">${next.title}</span></div>` : ''}
          <button onclick="navigateLessons(1)" ${!next ? 'disabled' : ''} class="flex items-center gap-2 text-primary font-bold hover:bg-primary-container/10 py-2 px-4 rounded-full transition-colors disabled:opacity-30">
            Next <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </div>
      </nav>
    `;
  }

  // ── Bottom Nav Navigation Click Handlers ─────────────────────────────────────
  window.navigateLessons = function(direction) {
    const all = allSections.flatMap(s => s.lessons);
    const idx = currentLesson ? all.findIndex(l => l.id === currentLesson.id) : -1;
    const next = all[idx + direction];
    if (next) {
      loadLesson(next);
    }
  };

  // ── Mark Complete Handler ──────────────────────────────────────────────────
  window.markComplete = async function(lessonId) {
    try {
      await fetch(`/api/classroom/lessons/${lessonId}/progress?status=COMPLETED`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      // Refresh lessons and update sidebar
      const res = await fetch('/api/classroom/lessons?module=PRONUNCIATION', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      allSections = await res.json();
      const updated = allSections.flatMap(s => s.lessons).find(l => l.id === lessonId);
      if (updated) {
        currentLesson = updated;
        loadLesson(updated);
      } else {
        renderSidebar(allSections);
      }
    } catch(e) {
      console.error("markComplete error:", e);
    }
  };

  // ── Sticky TOC Scroll Sync ───────────────────────────────────────────────────
  const mainScrollContainer = document.getElementById('main-content-container');
  if (mainScrollContainer) {
    mainScrollContainer.addEventListener('scroll', () => {
      const scrollTop = mainScrollContainer.scrollTop;
      const docHeight = mainScrollContainer.scrollHeight - mainScrollContainer.clientHeight;
      const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      
      const progressEl = document.getElementById('reading-progress');
      if (progressEl) progressEl.style.width = progress + '%';

      // Highlight active TOC link
      const sections = mainScrollContainer.querySelectorAll('[id]');
      let activeSectionId = '';
      sections.forEach(sec => {
        if (sec.id && sec.id !== 'reading-progress') {
          const rect = sec.getBoundingClientRect();
          if (rect.top <= 200) {
            activeSectionId = sec.id;
          }
        }
      });

      document.querySelectorAll('.toc-link').forEach(link => {
        link.classList.toggle('active', link.dataset.anchor === activeSectionId);
      });
    });
  }

  // Intercept click on TOC links to smooth scroll main container
  document.addEventListener('click', e => {
    const link = e.target.closest('.toc-link');
    if (link) {
      e.preventDefault();
      const targetId = link.getAttribute('href').slice(1);
      const targetEl = document.getElementById(targetId);
      if (targetEl && mainScrollContainer) {
        const containerRect = mainScrollContainer.getBoundingClientRect();
        const elRect = targetEl.getBoundingClientRect();
        const offset = elRect.top - containerRect.top + mainScrollContainer.scrollTop - 20;
        mainScrollContainer.scrollTo({ top: offset, behavior: 'smooth' });
      }
    }
  });

  // ── Ask AI Teacher Handlers ─────────────────────────────────────────────────
  document.getElementById('ai-teacher-btn').onclick = () => document.getElementById('ai-modal').classList.remove('hidden');
  document.getElementById('close-ai-modal').onclick = () => document.getElementById('ai-modal').classList.add('hidden');

  document.getElementById('ai-send-btn').onclick = async () => {
    const input = document.getElementById('ai-question');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    
    const history = document.getElementById('ai-chat-history');
    history.innerHTML += `<div class="self-end bg-primary text-on-primary rounded-xl px-4 py-2 max-w-[85%] text-body-md font-semibold">${text}</div>`;
    history.scrollTop = history.scrollHeight;

    try {
      const res = await fetch('/api/chat/ask-teacher', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ question: text, lessonTitle: currentLesson ? currentLesson.title : '' })
      });
      const data = await res.json();
      history.innerHTML += `<div class="self-start bg-surface-container-high text-on-surface rounded-xl px-4 py-2 max-w-[85%] text-body-md leading-relaxed">${data.answer || 'Sorry, I couldn\'t fetch a response.'}</div>`;
      history.scrollTop = history.scrollHeight;
    } catch(e) {
      console.error(e);
      history.innerHTML += `<div class="self-start bg-red-100 text-red-800 rounded-xl px-4 py-2 max-w-[85%] text-body-sm font-bold">Error connecting to AI teacher.</div>`;
    }
  };

  document.getElementById('ai-question').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('ai-send-btn').click();
  });

  // ── Initialize App ──────────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch('/api/classroom/lessons?module=PRONUNCIATION', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('speakmate_token');
        window.location.href = '/login.html';
        return;
      }
      if (!res.ok) {
        throw new Error('HTTP ' + res.status);
      }
      allSections = await res.json();
      renderSidebar(allSections);
      
      // Auto-load first lesson or specified active lesson
      if (allSections.length > 0 && allSections[0].lessons.length > 0) {
        loadLesson(allSections[0].lessons[0]);
      }
    } catch(e) {
      console.error("Init Error:", e);
    }
  }

  init();
</script>
</body>
</html>
