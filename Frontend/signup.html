<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpeakMate AI - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "background": "#FDF6E3",
          "surface-container": "#f6eddd",
          "surface-container-low": "#fcf2e3",
          "surface-container-lowest": "#ffffff",
          "outline": "#7f7663",
          "outline-variant": "#d1c5af",
          "on-surface": "#1f1b12",
          "primary-container": "#F5C84C",
          "charcoal": "#2D2A26",
          "amber-brand": "#E8A020"
        },
        borderRadius: {
          "DEFAULT": "1rem",
          "lg": "1.5rem",
          "xl": "1.25rem",
          "full": "9999px"
        },
        fontFamily: {
          "ui": ["Poppins", "sans-serif"],
          "brand": ["Quicksand", "sans-serif"]
        }
      }
    }
  }
</script>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background-color: #FDF6E3;
    overflow: hidden;
    font-size: 14px;
  }
  .blur-blob {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    filter: blur(80px);
    z-index: -1;
    opacity: 0.1;
  }
  .blob-tr { top: -80px; right: -80px; background-color: #F5C84C; }
  .blob-bl { bottom: -80px; left: -80px; background-color: #E8A020; }

  .wave-bar {
    width: 3px;
    background-color: #F5C84C;
    border-radius: 4px;
    animation: wave 1s ease-in-out infinite;
  }
  @keyframes wave {
    0%, 100% { height: 6px; }
    50% { height: 20px; }
  }
  .btn-gold-gradient {
    background: linear-gradient(135deg, #F2B544 0%, #F5C84C 100%);
  }
  .input-focus-glow:focus {
    box-shadow: 0 0 0 2px rgba(245, 200, 76, 0.2);
    border-color: #F5C84C !important;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
</style>
  <script src="config.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<!-- Atmospheric Background Blobs -->
<div class="blur-blob blob-tr"></div>
<div class="blur-blob blob-bl"></div>

<!-- Main Container Card — same max-width as login (720px) -->
<main class="w-full max-w-[720px] bg-white rounded-xl overflow-hidden border border-[#E8E0D0]/50 flex flex-col md:flex-row relative">

  <!-- Left Panel: Brand & Imagery (40%) — same as login -->
  <div class="hidden md:block w-[40%] relative overflow-hidden bg-surface-container">
    <img
      alt="Student studying with SpeakMate AI"
      class="absolute inset-0 w-full h-full object-cover"
      src="assets/images/student_study.png"
    />
  </div>

  <!-- Right Panel: Form (60%) — same as login -->
  <div class="flex-1 w-full md:w-[60%] bg-white p-6 md:p-10 flex flex-col justify-center">
    <div class="flex flex-col gap-5">

      <!-- Logo — identical to login -->
      <div class="flex items-center gap-3 group cursor-pointer w-fit" id="brand-logo">
        <div class="w-9 h-9 bg-charcoal rounded flex items-center justify-center gap-1">
          <div class="wave-bar" style="animation-delay: 0.1s;"></div>
          <div class="wave-bar" style="animation-delay: 0.2s;"></div>
          <div class="wave-bar" style="animation-delay: 0.3s;"></div>
          <div class="wave-bar" style="animation-delay: 0.4s;"></div>
          <div class="wave-bar" style="animation-delay: 0.5s;"></div>
        </div>
        <span class="font-brand text-[22px] font-bold tracking-tight text-charcoal">
          Speak<span class="text-amber-brand">Mate</span><span class="text-charcoal"> AI</span>
        </span>
      </div>

      <!-- Heading -->
      <div>
        <h1 class="text-[20px] font-bold text-charcoal mb-0.5 leading-tight">Start your journey!</h1>
        <p class="text-[13px] text-charcoal/60">Create your account and meet your AI mentor.</p>
      </div>

    </div>

    <!-- Signup Form -->
    <form class="flex flex-col gap-3 mt-6" id="signup-form" onsubmit="return false">

      <!-- Full Name -->
      <div class="relative">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
          <span class="material-symbols-outlined text-[18px]">person</span>
        </div>
        <input
          id="fullname"
          class="w-full pl-12 pr-5 h-[42px] bg-[#FDFAF4] border border-[#E8E0D0] rounded-full text-charcoal input-focus-glow transition-all placeholder:text-outline/60 outline-none text-[13px]"
          placeholder="Full name"
          type="text"
          required
        />
      </div>

      <!-- Email -->
      <div class="relative">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
          <span class="material-symbols-outlined text-[18px]">mail</span>
        </div>
        <input
          id="email"
          class="w-full pl-12 pr-5 h-[42px] bg-[#FDFAF4] border border-[#E8E0D0] rounded-full text-charcoal input-focus-glow transition-all placeholder:text-outline/60 outline-none text-[13px]"
          placeholder="Email address"
          type="email"
          required
        />
      </div>

      <!-- Password -->
      <div class="relative">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
          <span class="material-symbols-outlined text-[18px]">lock</span>
        </div>
        <input
          id="password"
          class="w-full pl-12 pr-5 h-[42px] bg-[#FDFAF4] border border-[#E8E0D0] rounded-full text-charcoal input-focus-glow transition-all placeholder:text-outline/60 outline-none text-[13px]"
          placeholder="Create password"
          type="password"
          required
        />
      </div>

      <!-- Confirm Password -->
      <div class="relative">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
          <span class="material-symbols-outlined text-[18px]">lock_reset</span>
        </div>
        <input
          id="confirm-password"
          class="w-full pl-12 pr-5 h-[42px] bg-[#FDFAF4] border border-[#E8E0D0] rounded-full text-charcoal input-focus-glow transition-all placeholder:text-outline/60 outline-none text-[13px]"
          placeholder="Confirm password"
          type="password"
          required
        />
      </div>

      <!-- Buttons — same style as login -->
      <div class="flex flex-col gap-2.5 mt-3">
        <button id="signup-btn" type="submit" class="btn-gold-gradient w-full h-[48px] rounded-full font-bold text-charcoal shadow-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-2 text-[14px]">
          <span>Create Account</span>
          <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </button>

        <div class="relative flex items-center justify-center my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-charcoal/20"></div>
          </div>
          <span class="relative bg-white px-4 text-[12px] font-bold text-charcoal/40 uppercase tracking-widest">Or</span>
        </div>

        <!-- Official Google Button Container -->
        <div class="flex justify-center w-full">
          <div id="google-btn"></div>
        </div>
      </div>

      <p class="text-center text-[12px] text-charcoal/40 mt-2">
        Already have an account?
        <a class="text-amber-brand font-bold hover:underline" href="login.html">Login</a>
      </p>

    </form>
  </div>

</main>

<script>
  // Logo hover — speed up wave bars like login page
  const logo = document.getElementById('brand-logo');
  const bars = document.querySelectorAll('.wave-bar');
  logo.addEventListener('mouseenter', () => {
    bars.forEach(b => b.style.animationDuration = '0.4s');
  });
  logo.addEventListener('mouseleave', () => {
    bars.forEach(b => b.style.animationDuration = '1s');
  });

  // Wire up signup API
  const form = document.getElementById('signup-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fullName = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (password !== confirmPassword) {
      alert("Passwords do not match!");
      return;
    }

    // Map full name to username by replacing spaces
    const username = fullName.toLowerCase().replace(/\s+/g, '');

    try {
      const response = await fetch(API_BASE_URL + '/api/auth/signup', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, email, password })
      });

      const data = await response.json();
      if (response.ok) {
        alert("Registration successful! Redirecting to login page...");
        window.location.href = 'login.html';
      } else {
        alert(data.message || "Registration failed. Please check inputs.");
      }
    } catch (err) {
      console.error(err);
      alert("An error occurred. Please make sure the backend server is running.");
    }
  });

  // Official Google Sign-In Initialization
  window.onload = function () {
    // IMPORTANT: Replace this with your actual Google Client ID from Google Cloud Console!
    const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID_HERE";
    
    if (GOOGLE_CLIENT_ID !== "YOUR_GOOGLE_CLIENT_ID_HERE") {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleResponse
      });
      google.accounts.id.renderButton(
        document.getElementById("google-btn"),
        { theme: "outline", size: "large", width: 300, shape: "pill" }
      );
    } else {
      document.getElementById("google-btn").innerHTML = "<p class='text-xs text-red-500 text-center'>Google Client ID is missing.<br/>Check signup.html code.</p>";
    }
  };

  async function handleGoogleResponse(response) {
    // Decode the Google JWT credential
    const token = response.credential;
    const payload = JSON.parse(atob(token.split('.')[1]));
    
    try {
      const res = await fetch(API_BASE_URL + '/api/auth/google', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          googleId: payload.sub,
          email: payload.email,
          name: payload.name
        })
      });

      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('speakmate_token', data.token);
        localStorage.setItem('speakmate_user', JSON.stringify({
          userId: data.userId,
          username: data.username,
          email: data.email,
          learningLevel: data.learningLevel
        }));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.message || "Google Sign-In failed.");
      }
    } catch (err) {
      console.error(err);
      alert("An error occurred during Google Sign-In.");
    }
  }
</script>

</body>
</html>
